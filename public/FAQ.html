<!-- FAQ -->
<section class="section reveal">
  <h1>Часто задаваемые вопросы</h1>

  <div id="faqList">

    <div class="faq-item">
      <div class="faq-q">Сколько длится урок?</div>
      <div class="faq-a">60 минут</div>
    </div>

    <div class="faq-item">
      <div class="faq-q">Есть пробный урок?</div>
      <div class="faq-a">Да, бесплатный</div>
    </div>

    <div class="faq-item">
      <div class="faq-q">Формат занятий?</div>
      <div class="faq-a">Онлайн индивидуально</div>
    </div>

  </div>

  <!-- ADD QUESTION -->
  <div class="faq-add form">

    <input type="text" id="questionInput" placeholder="Ваш вопрос">

    <button class="btn" onclick="addQuestion()">
      Добавить вопрос
    </button>

  </div>
</section>

<!-- MODAL -->
<div class="modal" id="faqModal">
  <div class="modal-content">
    <h3>📩 Ваш вопрос будет рассмотрен</h3>
    <button class="btn" onclick="closeFaqModal()">Ок</button>
  </div>
</div>
