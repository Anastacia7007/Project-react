<section class="section">

  <h1>Контакты</h1>
  <p>Свяжитесь со мной удобным способом</p>

  <div class="contacts-grid">

    <!-- 1 ряд -->
    <div class="card contact-card">
      <div class="contact-icon">
        <svg viewBox="0 0 24 24">
          <path d="M4 6h16v12H4z"/>
          <path d="M4 7l8 6 8-6"/>
        </svg>
      </div>
      <h3>Email</h3>
      <p>teacher@mail.com</p>
      <button class="btn">Написать</button>
    </div>

    <div class="card contact-card">
      <div class="contact-icon">
        <svg viewBox="0 0 24 24">
          <path d="M21 3L3 11l7 2 2 7 9-17z"/>
        </svg>
      </div>
      <h3>Telegram</h3>
      <p>@teacher</p>
      <button class="btn">Открыть</button>
    </div>

    <div class="card contact-card">
      <div class="contact-icon">
        <svg viewBox="0 0 24 24">
          <path d="M20 12a8 8 0 10-15 5l-1 5 5-1a8 8 0 0011-9z"/>
        </svg>
      </div>
      <h3>WhatsApp</h3>
      <p>+7 (999) 000-00-00</p>
      <button class="btn">Написать</button>
    </div>

    <!-- 2 ряд -->
    <div class="card contact-card">
      <div class="contact-icon">
        <svg viewBox="0 0 24 24">
          <rect x="3" y="3" width="18" height="18" rx="5"/>
          <path d="M7 10l5 3 5-3"/>
        </svg>
      </div>
      <h3>Instagram</h3>
      <p>@teacher</p>
      <button class="btn">Открыть</button>
    </div>

    <div class="card contact-card">
      <div class="contact-icon">
        <svg viewBox="0 0 24 24">
          <rect x="3" y="6" width="18" height="12" rx="4"/>
          <path d="M10 9l5 3-5 3z"/>
        </svg>
      </div>
      <h3>YouTube</h3>
      <p>youtube.com/@teacher</p>
      <button class="btn">Смотреть</button>
    </div>

    <!-- VK -->
    <div class="card contact-card">
      <div class="contact-icon">
        <svg viewBox="0 0 24 24">
          <path d="M4 7c1 5 4 10 10 10h1v-3c2 2 3 3 5 3h2v-3c-2-1-3-2-4-4 1-2 2-3 4-5V5h-2c-2 0-3 1-5 3V5h-1C8 5 5 10 4 7z"/>
        </svg>
      </div>
      <h3>VK</h3>
      <p>vk.com/teacher</p>
      <button class="btn">Открыть</button>
    </div>

  </div>

</section>
